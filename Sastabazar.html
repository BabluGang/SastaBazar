  <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Noto+Nastaliq+Urdu&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --red: #D32F2F;
      --red-dark: #B71C1C;
      --red-light: #FFEBEE;
      --green: #2E7D32;
      --green-light: #E8F5E9;
      --white: #FFFFFF;
      --off-white: #FFF8F8;
      --black: #1A0A0A;
      --gray: #6B6B6B;
      --gray-light: #F5F0F0;
      --border: #E8D8D8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--off-white);
      color: var(--black);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--red);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(211,47,47,0.3);
    }

    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }

    .logo {
      font-family: 'Dela Gothic One', sans-serif;
      font-size: 22px;
      color: var(--white);
      letter-spacing: -0.5px;
      text-decoration: none;
    }

    .logo span {
      opacity: 0.7;
      font-size: 13px;
      display: block;
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      letter-spacing: 0;
      margin-top: -4px;
    }

    .stores-pill {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .store-tag {
      background: rgba(255,255,255,0.18);
      color: white;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 500;
    }

    /* ── HERO ── */
    .hero {
      background: var(--red);
      padding: 28px 24px 36px;
      text-align: center;
    }

    .hero h1 {
      font-family: 'Dela Gothic One', sans-serif;
      font-size: clamp(24px, 5vw, 38px);
      color: white;
      line-height: 1.1;
      margin-bottom: 6px;
    }

    .hero p {
      color: rgba(255,255,255,0.8);
      font-size: 14px;
      margin-bottom: 20px;
    }

    /* ── SEARCH ── */
    .search-wrap {
      max-width: 580px;
      margin: 0 auto;
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      padding: 16px 56px 16px 20px;
      border-radius: 14px;
      border: none;
      font-size: 16px;
      font-family: 'DM Sans', sans-serif;
      background: white;
      color: var(--black);
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      outline: none;
    }

    .search-wrap input::placeholder { color: #AAA; }

    .search-btn {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--red-dark);
      border: none;
      border-radius: 10px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: white;
      font-size: 18px;
    }

    /* ── CATEGORIES ── */
    .categories {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 16px 8px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .cat-btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: var(--black);
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .cat-btn:hover, .cat-btn.active {
      background: var(--red);
      color: white;
      border-color: var(--red);
    }

    /* ── MAIN CONTENT ── */
    .main {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 16px 40px;
    }

    /* ── RESULTS HEADER ── */
    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0 12px;
    }

    .results-count {
      font-size: 13px;
      color: var(--gray);
      font-weight: 500;
    }

    .sort-select {
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      background: white;
      cursor: pointer;
      color: var(--black);
    }

    /* ── PRODUCT GRID ── */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }

    .product-card {
      background: white;
      border-radius: 14px;
      border: 1.5px solid var(--border);
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
      display: flex;
      flex-direction: column;
    }

    .product-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(211,47,47,0.1);
      border-color: var(--red);
    }

    .product-card.cheapest {
      border-color: var(--green);
      box-shadow: 0 2px 12px rgba(46,125,50,0.12);
    }

    .card-img {
      width: 100%;
      height: 140px;
      object-fit: contain;
      background: var(--gray-light);
      padding: 10px;
      border-bottom: 1px solid var(--border);
    }

    .card-top {
      padding: 14px 14px 10px;
      flex: 1;
    }

    .store-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--red-light);
      color: var(--red);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-bottom: 8px;
    }

    .cheapest .store-badge {
      background: var(--green-light);
      color: var(--green);
    }

    .cheapest-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--green);
      color: white;
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 8px;
      margin-left: 4px;
    }

    .product-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--black);
      line-height: 1.4;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .product-category {
      font-size: 11px;
      color: var(--gray);
      text-transform: capitalize;
    }

    .card-bottom {
      padding: 10px 14px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--gray-light);
    }

    .price {
      font-family: 'Dela Gothic One', sans-serif;
      font-size: 20px;
      color: var(--black);
    }

    .cheapest .price {
      color: var(--green);
    }

    .view-btn {
      background: var(--red-light);
      color: var(--red);
      border: none;
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }

    .view-btn:hover { background: var(--red); color: white; }

    .cheapest .view-btn {
      background: var(--green-light);
      color: var(--green);
    }

    .cheapest .view-btn:hover { background: var(--green); color: white; }

    /* ── EMPTY / LOADING STATES ── */
    .state-box {
      text-align: center;
      padding: 60px 20px;
      color: var(--gray);
    }

    .state-box .icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .state-box h3 {
      font-size: 18px;
      color: var(--black);
      margin-bottom: 6px;
    }

    .state-box p { font-size: 14px; }

    /* loading spinner */
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--red-light);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 24px;
      color: var(--gray);
      font-size: 12px;
      border-top: 1px solid var(--border);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      .product-grid { grid-template-columns: 1fr 1fr; }
      .hero { padding: 20px 16px 28px; }
      .stores-pill { display: none; }
    }

    @media (max-width: 360px) {
      .product-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

    <h1>Compare Grocery Prices.<br>Save Every Visit.</h1>
    <p>Search any product to see prices across Pakistani stores — buy where it's cheapest.</p>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search rice, oil, atta, masala..." autocomplete="off" />
      <button class="search-btn" onclick="handleSearch()">🔍</button>
    </div>
  </div>

  <div class="categories">
    <button class="cat-btn active" onclick="filterCategory('all', this)">🛒 All</button>
    <button class="cat-btn" onclick="filterCategory('rice', this)">🍚 Rice</button>
    <button class="cat-btn" onclick="filterCategory('oil', this)">🫙 Oil & Ghee</button>
    <button class="cat-btn" onclick="filterCategory('flour', this)">🌾 Flour</button>
    <button class="cat-btn" onclick="filterCategory('pulses', this)">🫘 Pulses</button>
    <button class="cat-btn" onclick="filterCategory('spices', this)">🌶️ Spices</button>
    <button class="cat-btn" onclick="filterCategory('salt_sugar', this)">🧂 Salt & Sugar</button>
  </div>

  <div class="main">
    <div class="results-header" id="resultsHeader" style="display:none">
      <span class="results-count" id="resultsCount"></span>
      <select class="sort-select" id="sortSelect" onchange="sortProducts()">
        <option value="default">Default</option>
        <option value="price_asc">Price: Low to High</option>
        <option value="price_desc">Price: High to Low</option>
        <option value="name_asc">Name: A–Z</option>
      </select>
    </div>

    <div id="productGrid" class="product-grid"></div>
  </div>

  <footer>
    <p>SastaBazar · Prices sourced from store websites · May vary slightly in-store</p>
    <p style="margin-top:4px">Built for Pakistan 🇵🇰</p>
  </footer>

  <script>
    const SUPABASE_URL = 'https://tnvyuqeejfosjkdfknfr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRudnl1cWVlamZvc2prZGZrbmZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTk5MTcsImV4cCI6MjA4OTU3NTkxN30.97Zf8dlVJFMAa62rX2jRqmVmWbuHa24_5JFEyuDWwyE';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let allProducts = [];
    let filteredProducts = [];
    let currentCategory = 'all';
    let currentSearch = '';

    // ── INIT: load all products on page load
    async function init() {
      showLoading();
      const { data, error } = await sb
        .from('products')
        .select('*')
        .order('category')
        .limit(1000);

      if (error) {
        showError('Could not load products. Please try again.');
        return;
      }

      allProducts = data || [];
      filteredProducts = allProducts;
      render(filteredProducts);
    }

    // ── SEARCH
    function handleSearch() {
      currentSearch = document.getElementById('searchInput').value.trim().toLowerCase();
      applyFilters();
    }

    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSearch();
    });

    document.getElementById('searchInput').addEventListener('input', e => {
      if (e.target.value === '') {
        currentSearch = '';
        applyFilters();
      }
    });

    // ── CATEGORY FILTER
    function filterCategory(cat, btn) {
      currentCategory = cat;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyFilters();
    }

    // ── APPLY BOTH FILTERS
    function applyFilters() {
      let results = allProducts;

      if (currentCategory !== 'all') {
        results = results.filter(p => p.category === currentCategory);
      }

      if (currentSearch) {
        results = results.filter(p =>
          p.name.toLowerCase().includes(currentSearch)
        );
      }

      filteredProducts = results;
      sortProducts();
    }

    // ── SORT
    function sortProducts() {
      const sort = document.getElementById('sortSelect').value;
      let sorted = [...filteredProducts];

      if (sort === 'price_asc') sorted.sort((a, b) => (a.price_numeric || 0) - (b.price_numeric || 0));
      else if (sort === 'price_desc') sorted.sort((a, b) => (b.price_numeric || 0) - (a.price_numeric || 0));
      else if (sort === 'name_asc') sorted.sort((a, b) => a.name.localeCompare(b.name));

      render(sorted);
    }

    // ── FIND CHEAPEST per category group (for future multi-store)
    // For now since we only have Naheed, highlight lowest price in each category
    function getCheapestIds(products) {
      const byCategory = {};
      products.forEach(p => {
        if (!byCategory[p.category] || (p.price_numeric && p.price_numeric < byCategory[p.category])) {
          byCategory[p.category] = p.price_numeric;
        }
      });
      // Mark items that are the single cheapest price in category
      // In multi-store scenario this would highlight across stores
      const cheapestSet = new Set();
      products.forEach(p => {
        if (p.price_numeric && p.price_numeric === byCategory[p.category]) {
          cheapestSet.add(p.id);
        }
      });
      return cheapestSet;
    }

    // ── RENDER
    function render(products) {
      const grid = document.getElementById('productGrid');
      const header = document.getElementById('resultsHeader');
      const count = document.getElementById('resultsCount');

      if (products.length === 0) {
        header.style.display = 'none';
        grid.innerHTML = `
          <div class="state-box" style="grid-column:1/-1">
            <div class="icon">🔍</div>
            <h3>No products found</h3>
            <p>Try a different search term or category</p>
          </div>`;
        return;
      }

      header.style.display = 'flex';
      count.textContent = `${products.length} product${products.length !== 1 ? 's' : ''} found`;

      // Cheapest logic — across stores for same product name keyword
      // Group by simplified name for cross-store comparison
      const priceMap = {};
      products.forEach(p => {
        const key = p.name.toLowerCase().split(',')[0].trim();
        if (!priceMap[key] || p.price_numeric < priceMap[key]) {
          priceMap[key] = p.price_numeric;
        }
      });

      grid.innerHTML = products.map(p => {
        const key = p.name.toLowerCase().split(',')[0].trim();
        const isCheapest = p.price_numeric && p.price_numeric === priceMap[key] && p.price_numeric > 0;
        const categoryLabel = {
          rice: 'Rice', oil: 'Oil & Ghee', flour: 'Flour',
          pulses: 'Pulses', spices: 'Spices', salt_sugar: 'Salt & Sugar'
        }[p.category] || p.category;

        return `
          <div class="product-card ${isCheapest ? 'cheapest' : ''}">
            ${p.image ? `<img class="card-img" src="${p.image}" alt="${p.name}" loading="lazy" onerror="this.style.display='none'">` : ''}
            <div class="card-top">
              <div>
                <span class="store-badge">🏪 ${p.store}</span>
                ${isCheapest ? '<span class="cheapest-badge">✅ Best Price</span>' : ''}
              </div>
              <div class="product-name">${p.name}</div>
              <div class="product-category">${categoryLabel}</div>
            </div>
            <div class="card-bottom">
              <span class="price">${p.price}</span>
              <a href="${p.url}" target="_blank" rel="noopener" class="view-btn">Buy →</a>
            </div>
          </div>`;
      }).join('');
    }

    function showLoading() {
      document.getElementById('resultsHeader').style.display = 'none';
      document.getElementById('productGrid').innerHTML = `
        <div class="state-box" style="grid-column:1/-1">
          <div class="spinner"></div>
          <p>Loading products...</p>
        </div>`;
    }

    function showError(msg) {
      document.getElementById('productGrid').innerHTML = `
        <div class="state-box" style="grid-column:1/-1">
          <div class="icon">⚠️</div>
          <h3>Something went wrong</h3>
          <p>${msg}</p>
        </div>`;
    }

    init();
  </script>
</body>
